<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Una calculadora más</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="CartaInicio"> 
    <h1>Hola mi payico</h1>
  <p>esta es una calculadora noraml apenas ando aprendiendo</p>

  <button id="StartButton">
    Iniciar Calculadora
    </button>  
  </div> 
  <div id="Calculator">
    <h2>Calculadora</h2>
    <input type="text" id="PantallaCalculadora">

    <br><br>

    <button class="numero">1</button>
    <button class="numero">2</button>
    <button class="numero">3</button>
    <button class="operador">+</button>

    <br><br>

    <button class="numero">4</button>
    <button class="numero">5</button>
    <button class="numero">6</button>
    <button class="operador">-</button>

    <br><br>

    <button class="numero">7</button>
    <button class="numero">8</button>
    <button class="numero">9</button>
    <button class="operador">*</button>

    <br><br>

    <button class="numero">0</button>
    <button class="igual">=</button>
    <button class="borrar">C</button>
  </div>
<script src="script.js"></script>
</body>
</html>
